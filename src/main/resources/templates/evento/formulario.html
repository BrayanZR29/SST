<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'} + ' - SG-SST'">Formulario - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
        .form-control:focus, .form-select:focus {
            border-color: #2E86AB;
            box-shadow: 0 0 0 0.2rem rgba(46,134,171,0.25);
        }
        .was-validated .form-control:invalid:focus {
            border-color: #DC3545;
            box-shadow: 0 0 0 0.2rem rgba(220,53,69,0.25);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <h2 class="mb-4" th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'}">Registrar Evento</h2>

                <div class="card">
                    <div class="card-body">
                        <!-- Enctype para soportar archivos si se necesita -->
                        <form th:action="@{/evento/guardar}" th:object="${evento}" method="post" class="needs-validation" novalidate>
                            <input type="hidden" th:field="*{id}">

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tipo de Evento *</label>
                                    <select th:field="*{tipo}" class="form-select" required>
                                        <option value="">Seleccione...</option>
                                        <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo.descripcion}"></option>
                                    </select>
                                    <div class="invalid-feedback">Por favor seleccione un tipo</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Gravedad *</label>
                                    <select th:field="*{gravedad}" class="form-select" required>
                                        <option value="">Seleccione...</option>
                                        <option th:each="g : ${gravedades}" th:value="${g}" th:text="${g.descripcion}"></option>
                                    </select>
                                    <div class="invalid-feedback">Por favor seleccione la gravedad</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Fecha y Hora del Evento *</label>
                                    <input type="datetime-local" th:field="*{fechaHora}" class="form-control" required>
                                    <div class="invalid-feedback">Por favor ingrese la fecha y hora</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Lugar / Area *</label>
                                    <input type="text" th:field="*{lugar}" class="form-control" placeholder="Ej: Almacen, Oficina A" required minlength="3">
                                    <div class="invalid-feedback">El lugar debe tener al menos 3 caracteres</div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Personas Involucradas</label>
                                    <input type="text" th:field="*{personasInvolucradas}" class="form-control" placeholder="Nombres de las personas involucradas">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Descripcion del Hecho *</label>
                                    <textarea th:field="*{descripcion}" class="form-control" rows="4" placeholder="Describa detalladamente lo ocurrido..." required minlength="10"></textarea>
                                    <div class="invalid-feedback">La descripcion debe tener al menos 10 caracteres</div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Consecuencias</label>
                                    <textarea th:field="*{consecuencias}" class="form-control" rows="3" placeholder="Lesiones, danos materiales, etc."></textarea>
                                </div>
                            </div>

                            <hr class="my-4">
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/evento/lista}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-2"></i>Guardar Evento
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validacion del lado del cliente
        (function() {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(function(form) {
                form.addEventListener('submit', function(event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>
