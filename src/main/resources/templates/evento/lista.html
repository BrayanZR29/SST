<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <!-- Mensaje de exito -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Eventos</h2>
                    <a th:href="@{/evento/nuevo}" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Nuevo Evento</a>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/evento/lista}" method="get" class="row g-3">
                            <div class="col-md-2">
                                <label class="form-label">Estado</label>
                                <select name="estado" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="ABIERTO" th:selected="${estado == 'ABIERTO'}">Abierto</option>
                                    <option value="EN_PROCESO" th:selected="${estado == 'EN_PROCESO'}">En Proceso</option>
                                    <option value="CERRADO" th:selected="${estado == 'CERRADO'}">Cerrado</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Tipo</label>
                                <select name="tipo" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="ACCIDENTE" th:selected="${tipo == 'ACCIDENTE'}">Accidente</option>
                                    <option value="INCIDENTE" th:selected="${tipo == 'INCIDENTE'}">Incidente</option>
                                    <option value="ENFERMEDAD_PROFESIONAL" th:selected="${tipo == 'ENFERMEDAD_PROFESIONAL'}">Enfermedad</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Gravedad</label>
                                <select name="gravedad" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="LEVE" th:selected="${gravedad == 'LEVE'}">Leve</option>
                                    <option value="GRAVE" th:selected="${gravedad == 'GRAVE'}">Grave</option>
                                    <option value="MORTAL" th:selected="${gravedad == 'MORTAL'}">Mortal</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Lugar/Area</label>
                                <input type="text" name="lugar" class="form-control" th:value="${lugar}" placeholder="Buscar por lugar">
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-outline-primary me-2"><i class="bi bi-search me-1"></i>Buscar</button>
                                <a th:href="@{/evento/lista}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Limpiar</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Codigo</th>
                                        <th>Tipo</th>
                                        <th>Gravedad</th>
                                        <th>Fecha</th>
                                        <th>Lugar</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="evento : ${eventos.content}">
                                        <td><strong th:text="${evento.codigo}">ACC-001</strong></td>
                                        <td th:text="${evento.tipo.descripcion}">Accidente</td>
                                        <td>
                                            <span class="badge" th:classappend="${evento.gravedad.name() == 'LEVE' ? 'bg-success' : evento.gravedad.name() == 'GRAVE' ? 'bg-warning text-dark' : 'bg-danger'}"
                                                  th:text="${evento.gravedad.descripcion}">Leve</span>
                                        </td>
                                        <td th:text="${#temporals.format(evento.fechaHora, 'dd/MM/yyyy HH:mm')}">15/03/2026 08:30</td>
                                        <td th:text="${evento.lugar}">Almacen</td>
                                        <td>
                                            <span class="badge" th:classappend="${evento.estado.name() == 'ABIERTO' ? 'bg-danger' : evento.estado.name() == 'EN_PROCESO' ? 'bg-warning text-dark' : 'bg-success'}"
                                                  th:text="${evento.estado.descripcion}">Abierto</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/evento/detalle/{id}(id=${evento.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                                            <a th:href="@{/evento/editar/{id}(id=${evento.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${eventos.content.isEmpty()}">
                                        <td colspan="7" class="text-center text-muted py-4">No hay eventos registrados</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <nav th:if="${eventos.totalPages > 1}">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${eventos.first ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/evento/lista(page=${eventos.number - 1}, estado=${estado}, tipo=${tipo}, gravedad=${gravedad}, lugar=${lugar})}">Anterior</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}" th:classappend="${i == eventos.number ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/evento/lista(page=${i}, estado=${estado}, tipo=${tipo}, gravedad=${gravedad}, lugar=${lugar})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${eventos.last ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/evento/lista(page=${eventos.number + 1}, estado=${estado}, tipo=${tipo}, gravedad=${gravedad}, lugar=${lugar})}">Siguiente</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
