<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigacion - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a th:href="@{/evento/detalle/{id}(id=${evento.id})}" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-2"></i>Volver</a>
                        <h2 class="mt-2 mb-0">Investigacion del Evento</h2>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><span th:text="${evento.codigo}">ACC-001</span> - <span th:text="${evento.tipo.descripcion}">Accidente</span></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/investigacion/guardar}" th:object="${investigacion}" method="post">
                            <input type="hidden" name="eventoId" th:value="${evento.id}">

                            <div class="mb-4">
                                <label class="form-label fw-bold">Causa Inmediata *</label>
                                <textarea th:field="*{causaInmediata}" class="form-control" rows="3" 
                                          placeholder="Cual fue la causa directa del evento?" required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Causas Basicas *</label>
                                <textarea th:field="*{causaBasica}" class="form-control" rows="3" 
                                          placeholder="Cuales fueron las causas raiz o basicas?" required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Factores Contributorios</label>
                                <textarea th:field="*{factoresContribuitorios}" class="form-control" rows="3" 
                                          placeholder="Que factores contribuyeron al evento? (condiciones de trabajo, equipos, procedimientos, etc.)"></textarea>
                            </div>

                            <hr class="my-4">
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/evento/detalle/{id}(id=${evento.id})}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-2"></i>Guardar Investigacion
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
