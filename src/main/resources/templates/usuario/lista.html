<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Gestion de Usuarios</h2>
                    <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Nuevo Usuario</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                        <th>Rol</th>
                                        <th>Area</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="usuario : ${usuarios}">
                                        <td th:text="${usuario.nombre}">Juan Perez</td>
                                        <td th:text="${usuario.correo}">juan@ejemplo.com</td>
                                        <td>
                                            <span class="badge" th:classappend="${usuario.rol.name() == 'ADMIN' ? 'bg-danger' : 
                                                                           usuario.rol.name() == 'RESPONSABLE_SST' ? 'bg-primary' : 
                                                                           usuario.rol.name() == 'JEFE_AREA' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                                  th:text="${usuario.rol.descripcion}">Administrador</span>
                                        </td>
                                        <td th:text="${usuario.area} ?: '-'">SST</td>
                                        <td>
                                            <span class="badge" th:classappend="${usuario.activo ? 'bg-success' : 'bg-secondary'}"
                                                  th:text="${usuario.activo ? 'Activo' : 'Inactivo'}">Activo</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/admin/usuarios/eliminar/{id}(id=${usuario.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Esta seguro de eliminar?')">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
