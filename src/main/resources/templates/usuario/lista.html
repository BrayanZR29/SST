<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
        .sidebar {
            background: linear-gradient(180deg, #2E86AB 0%, #1a5f7a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 250px;
        }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 250px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center py-4">
            <i class="bi bi-shield-check fs-2"></i>
            <h5 class="mt-2 mb-0">SG-SST</h5>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/lista}"><i class="bi bi-clipboard-data me-2"></i>Eventos</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/nuevo}"><i class="bi bi-plus-circle me-2"></i>Registrar</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/estadisticas}"><i class="bi bi-bar-chart me-2"></i>Estadisticas</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/admin/usuarios}"><i class="bi bi-people me-2"></i>Usuarios</a></li>
            <li class="nav-item mt-5">
                <form th:action="@{/logout}" method="post"><button type="submit" class="nav-link border-0 bg-transparent w-100 text-start"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion</button></form>
            </li>
        </ul>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestion de Usuarios</h2>
            <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Nuevo Usuario</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Area</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${usuarios}">
                                <td th:text="${usuario.nombre}">Juan Perez</td>
                                <td th:text="${usuario.correo}">juan@ejemplo.com</td>
                                <td>
                                    <span class="badge" th:classappend="${usuario.rol.name() == 'ADMIN' ? 'bg-danger' : 
                                                                   usuario.rol.name() == 'RESPONSABLE_SST' ? 'bg-primary' : 
                                                                   usuario.rol.name() == 'JEFE_AREA' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                          th:text="${usuario.rol.descripcion}">Administrador</span>
                                </td>
                                <td th:text="${usuario.area} ?: '-'">SST</td>
                                <td>
                                    <span class="badge" th:classappend="${usuario.activo ? 'bg-success' : 'bg-secondary'}"
                                          th:text="${usuario.activo ? 'Activo' : 'Inactivo'}">Activo</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/usuarios/eliminar/{id}(id=${usuario.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Esta seguro de eliminar?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
