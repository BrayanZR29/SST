<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Password - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #F8F9FA; }</style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a th:href="@{/admin/usuarios}" class="text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-2"></i>Volver
                        </a>
                        <h2 class="mt-2 mb-0">Cambiar Password</h2>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-person me-2"></i>Usuario</h5>
                            </div>
                            <div class="card-body">
                                <p><strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span></p>
                                <p><strong>Correo:</strong> <span th:text="${usuario.correo}"></span></p>
                                <p><strong>Rol:</strong> <span th:text="${usuario.rol}"></span></p>
                            </div>
                        </div>

                        <div class="card mt-3">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-key me-2"></i>Nueva Password</h5>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/admin/usuarios/password/{id}(id=${usuario.id})}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label">Nueva Password</label>
                                        <input type="password" name="password" class="form-control" required minlength="6">
                                    </div>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-2"></i>Guardar
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
