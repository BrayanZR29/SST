<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${usuario.id != null ? 'Editar Usuario' : 'Nuevo Usuario'} + ' - SG-SST'">Formulario - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 th:text="${usuario.id != null ? 'Editar Usuario' : 'Nuevo Usuario'}">Usuario</h2>
                    <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Volver</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre Completo *</label>
                                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan Perez" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo Electronico *</label>
                                    <input type="email" th:field="*{correo}" class="form-control" placeholder="correo@ejemplo.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Contrasena <span th:if="${usuario.id == null}">*</span></label>
                                    <input type="password" th:field="*{password}" class="form-control" 
                                           th:placeholder="${usuario.id != null ? 'Dejar en blanco para no cambiar' : 'Ingrese contrasena'}"
                                           th:required="${usuario.id == null}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Rol *</label>
                                    <select th:field="*{rol}" class="form-select" required>
                                        <option value="">Seleccione...</option>
                                        <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol.descripcion}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Area</label>
                                    <input type="text" th:field="*{area}" class="form-control" placeholder="Ej: Almacen, Produccion">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Estado</label>
                                    <div class="form-check form-switch mt-2">
                                        <input type="checkbox" th:field="*{activo}" class="form-check-input" role="switch">
                                        <label class="form-check-label" th:for="activo">Usuario Activo</label>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4">
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/usuarios}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
