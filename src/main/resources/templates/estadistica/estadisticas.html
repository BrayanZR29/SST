<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadisticas - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #F8F9FA; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:replace="~{layout/base :: sidebar}"></nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                    </div>
                </nav>

                <h2 class="mb-4">Estadisticas y Reportes</h2>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card text-center h-100">
                            <div class="card-body">
                                <h6 class="text-muted">Total Accidentes</h6>
                                <h2 class="text-danger" th:text="${resumen.totalAccidentes ?: 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center h-100">
                            <div class="card-body">
                                <h6 class="text-muted">Total Incidentes</h6>
                                <h2 class="text-warning" th:text="${resumen.totalIncidentes ?: 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center h-100">
                            <div class="card-body">
                                <h6 class="text-muted">Casos Abiertos</h6>
                                <h2 class="text-danger" th:text="${resumen.totalAbiertos ?: 0}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center h-100">
                            <div class="card-body">
                                <h6 class="text-muted">Casos Cerrados</h6>
                                <h2 class="text-success" th:text="${resumen.totalCerrados ?: 0}">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-bar-chart me-2"></i>Eventos por Mes</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="graficoPorMes"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-pie-chart me-2"></i>Eventos por Area</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="graficoPorArea"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-pie-chart me-2"></i>Por Tipo</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="graficoPorTipo"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="bi bi-pie-chart me-2"></i>Por Gravedad</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="graficoPorGravedad"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const porMes = /*[[${porMes}]]*/ {};
        const porArea = /*[[${porArea}]]*/ {};
        const porTipo = /*[[${porTipo}]]*/ {};
        const porGravedad = /*[[${porGravedad}]]*/ {};

        new Chart(document.getElementById('graficoPorMes'), {
            type: 'bar',
            data: {
                labels: Object.keys(porMes),
                datasets: [{
                    label: 'Eventos',
                    data: Object.values(porMes),
                    backgroundColor: '#2E86AB'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        new Chart(document.getElementById('graficoPorArea'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(porArea),
                datasets: [{ data: Object.values(porArea), backgroundColor: ['#2E86AB', '#A23B72', '#F18F01', '#28A745', '#DC3545'] }]
            },
            options: { responsive: true }
        });

        new Chart(document.getElementById('graficoPorTipo'), {
            type: 'pie',
            data: {
                labels: Object.keys(porTipo),
                datasets: [{ data: Object.values(porTipo), backgroundColor: ['#DC3545', '#FFC107', '#28A745'] }]
            },
            options: { responsive: true }
        });

        new Chart(document.getElementById('graficoPorGravedad'), {
            type: 'pie',
            data: {
                labels: Object.keys(porGravedad),
                datasets: [{ data: Object.values(porGravedad), backgroundColor: ['#28A745', '#FFC107', '#DC3545'] }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
