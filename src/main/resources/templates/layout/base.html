<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2E86AB;
            --secondary: #A23B72;
            --accent: #F18F01;
            --success: #28A745;
            --warning: #FFC107;
            --danger: #DC3545;
            --bg-light: #F8F9FA;
        }
        body { background-color: var(--bg-light); }
        .sidebar {
            background: linear-gradient(180deg, var(--primary) 0%, #1a5f7a 100%);
            min-height: 100vh;
            color: white;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.85);
            border-radius: 8px;
            margin: 4px 0;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .card-stat {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card-stat:hover { transform: translateY(-5px); }
        .badge-estado {
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .badge-abierto { background-color: var(--danger); color: white; }
        .badge-en-proceso { background-color: var(--warning); color: black; }
        .badge-cerrado { background-color: var(--success); color: white; }
        .badge-leve { background-color: var(--success); }
        .badge-grave { background-color: var(--warning); }
        .badge-mortal { background-color: var(--danger); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse" th:fragment="sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-check fs-2"></i>
                        <h5 class="mt-2">SG-SST</h5>
                    </div>
                    <ul class="nav flex-column px-3">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}">
                                <i class="bi bi-speedometer2 me-2"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/evento/lista}">
                                <i class="bi bi-clipboard-data me-2"></i>Eventos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/evento/nuevo}">
                                <i class="bi bi-plus-circle me-2"></i>Registrar
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/estadisticas}">
                                <i class="bi bi-bar-chart me-2"></i>Estadisticas
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'RESPONSABLE_SST')">
                            <a class="nav-link" th:href="@{/admin/usuarios}">
                                <i class="bi bi-people me-2"></i>Usuarios
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="nav-link border-0 bg-transparent w-100 text-start">
                                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 my-3 shadow-sm" th:fragment="navbar">
                    <div class="container-fluid">
                        <span class="navbar-brand">
                            <i class="bi bi-shield-check text-primary me-2"></i>
                            <strong>Sistema de Gestion de SST</strong>
                        </span>
                        <div class="d-flex align-items-center">
                            <span class="me-3 text-muted">
                                <i class="bi bi-person-circle me-1"></i>
                                <span sec:authentication="name">Usuario</span>
                            </span>
                        </div>
                    </div>
                </nav>
                <div th:replace="~{${content} :: content}"></div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
