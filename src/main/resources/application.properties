# Permitir referencias circulares y overriding de beans
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true

# Configuracion del Servidor
server.port=8080

# Configuracion de la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sgsst?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=tuclavesql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# Configuracion JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar H2 completamente
spring.h2.console.enabled=false
spring.datasource.h2.enabled=false

# Configuracion de Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Configuracion de Seguridad
spring.security.user.name=admin
spring.security.user.password=admin123
