<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2E86AB 0%, #1a5f7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 400px;
        }
        .login-header {
            background: linear-gradient(135deg, #A23B72 0%, #8a2f60 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-body { padding: 40px; }
        .form-control:focus {
            border-color: #2E86AB;
            box-shadow: 0 0 0 0.2rem rgba(46,134,171,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #2E86AB 0%, #1a5f7a 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #1a5f7a 0%, #2E86AB 100%);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-check fs-1"></i>
            <h3 class="mt-2 mb-0">SG-SST</h3>
            <p class="mb-0 mt-1 opacity-75">Sistema de Gestion de Seguridad y Salud en el Trabajo</p>
        </div>
        <div class="login-body">
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Correo o contrasena incorrectos
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle me-2"></i>
                Sesion cerrada correctamente
            </div>
            <form th:action="@{/login}" method="post">
                <div class="mb-4">
                    <label class="form-label">Correo electronico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contrasena</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese su contrasena" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
