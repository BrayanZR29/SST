<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${usuario.id != null ? 'Editar Usuario' : 'Nuevo Usuario'} + ' - SG-SST'">Formulario - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
        .sidebar {
            background: linear-gradient(180deg, #2E86AB 0%, #1a5f7a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 250px;
        }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 250px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center py-4">
            <i class="bi bi-shield-check fs-2"></i>
            <h5 class="mt-2 mb-0">SG-SST</h5>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/lista}"><i class="bi bi-clipboard-data me-2"></i>Eventos</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/usuarios}"><i class="bi bi-people me-2"></i>Usuarios</a></li>
            <li class="nav-item mt-5">
                <form th:action="@{/logout}" method="post"><button type="submit" class="nav-link border-0 bg-transparent w-100 text-start"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion</button></form>
            </li>
        </ul>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${usuario.id != null ? 'Editar Usuario' : 'Nuevo Usuario'}">Usuario</h2>
            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Volver</a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre Completo *</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan Perez" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Correo Electronico *</label>
                            <input type="email" th:field="*{correo}" class="form-control" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contrasena <span th:if="${usuario.id == null}">*</span></label>
                            <input type="password" th:field="*{password}" class="form-control" 
                                   th:placeholder="${usuario.id != null ? 'Dejar en blanco para no cambiar' : 'Ingrese contrasena'}"
                                   th:required="${usuario.id == null}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Rol *</label>
                            <select th:field="*{rol}" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol.descripcion}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Area</label>
                            <input type="text" th:field="*{area}" class="form-control" placeholder="Ej: Almacen, Produccion">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <div class="form-check form-switch mt-2">
                                <input type="checkbox" th:field="*{activo}" class="form-check-input" role="switch">
                                <label class="form-check-label" th:for="activo">Usuario Activo</label>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/admin/usuarios}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
