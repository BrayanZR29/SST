<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'} + ' - SG-SST'">Formulario - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
        .sidebar {
            background: linear-gradient(180deg, #2E86AB 0%, #1a5f7a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 250px;
        }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 250px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center py-4">
            <i class="bi bi-shield-check fs-2"></i>
            <h5 class="mt-2 mb-0">SG-SST</h5>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/lista}"><i class="bi bi-clipboard-data me-2"></i>Eventos</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/nuevo}"><i class="bi bi-plus-circle me-2"></i>Registrar</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/estadisticas}"><i class="bi bi-bar-chart me-2"></i>Estadisticas</a></li>
            <li class="nav-item mt-5">
                <form th:action="@{/logout}" method="post"><button type="submit" class="nav-link border-0 bg-transparent w-100 text-start"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion</button></form>
            </li>
        </ul>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'}">Registrar Evento</h2>
            <a th:href="@{/evento/lista}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Volver</a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/evento/guardar}" th:object="${evento}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tipo de Evento *</label>
                            <select th:field="*{tipo}" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo.descripcion}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Gravedad *</label>
                            <select th:field="*{gravedad}" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option th:each="g : ${gravedades}" th:value="${g}" th:text="${g.descripcion}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha y Hora del Evento *</label>
                            <input type="datetime-local" th:field="*{fechaHora}" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Lugar / Area *</label>
                            <input type="text" th:field="*{lugar}" class="form-control" placeholder="Ej: Almacen, Oficina A" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Personas Involucradas</label>
                            <input type="text" th:field="*{personasInvolucradas}" class="form-control" placeholder="Nombres de las personas involucradas">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripcion del Hecho *</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="4" placeholder="Describa detalladamente lo ocurrido..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Consecuencias</label>
                            <textarea th:field="*{consecuencias}" class="form-control" rows="3" placeholder="Lesiones, danos materiales, etc."></textarea>
                        </div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/evento/lista}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-2"></i>Guardar Evento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
