<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigacion - SG-SST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #F8F9FA; }
        .sidebar {
            background: linear-gradient(180deg, #2E86AB 0%, #1a5f7a 100%);
            min-height: 100vh;
            color: white;
            position: fixed;
            width: 250px;
        }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); border-radius: 8px; margin: 4px 12px; }
        .sidebar .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 250px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center py-4">
            <i class="bi bi-shield-check fs-2"></i>
            <h5 class="mt-2 mb-0">SG-SST</h5>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/evento/lista}"><i class="bi bi-clipboard-data me-2"></i>Eventos</a></li>
            <li class="nav-item mt-5">
                <form th:action="@{/logout}" method="post"><button type="submit" class="nav-link border-0 bg-transparent w-100 text-start"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesion</button></form>
            </li>
        </ul>
    </div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <a th:href="@{/evento/detalle/{id}(id=${evento.id})}" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-2"></i>Volver</a>
                <h2 class="mt-2 mb-0">Investigacion del Evento</h2>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0"><span th:text="${evento.codigo}">ACC-001</span> - <span th:text="${evento.tipo.descripcion}">Accidente</span></h5>
            </div>
            <div class="card-body">
                <form th:action="@{/investigacion/guardar}" th:object="${investigacion}" method="post">
                    <input type="hidden" name="eventoId" th:value="${evento.id}">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Causa Inmediata *</label>
                        <textarea th:field="*{causaInmediata}" class="form-control" rows="3" 
                                  placeholder="Cual fue la causa directa del evento?" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Causas Basicas *</label>
                        <textarea th:field="*{causaBasica}" class="form-control" rows="3" 
                                  placeholder="Cuales fueron las causas raiz o basicas?" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Factores Contributorios</label>
                        <textarea th:field="*{factoresContribuitorios}" class="form-control" rows="3" 
                                  placeholder="Que factores contribuyeron al evento? (condiciones de trabajo, equipos, procedimientos, etc.)"></textarea>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/evento/detalle/{id}(id=${evento.id})}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Guardar Investigacion
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
